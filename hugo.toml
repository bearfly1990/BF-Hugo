baseURL = "https://bearfly1990.github.io/BF-Hugo/"
languageCode = "zh-cn"
title = "Shawn's Blog"
theme = "github-style"
pygmentsCodeFences = true
pygmentsUseClasses = true
# 启用相对URL（关键，所有链接自动适配子路径）
relativeURLs = false
canonifyURLs = true
[server]
  disableFastRender = true    # 关闭快速渲染，强制全量更
  #noHTTPCache = true          # 禁用服务端缓存
  #watch = true                # 强制监听文件变更
  #liveReload = true           # 开启自动刷新（浏览器自动更，不用手动刷）

# 启用标签/分类（保留之前的配置）
[taxonomies]
  tag = "tags"
  category = "categories"


# 启用搜索索引生成（必须）
[outputs]
  home = ["HTML", "JSON"]  # 首页同时输出 HTML 和 JSON 索引

# 配置索引文件格式（适配 github-style 主题的搜索逻辑）
[outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
    notAlternative = true

[params]
  author = "Shawn"
  description = "Embrace life as it is, Cherish what you have now"
  github = "bearfly1990"
  #facebook = "bearfly1990"
  #twitter = "bearfly1990"
  #linkedin = "bearfly1990"
  #instagram = "bearfly1990"
  #tumblr = "bearfly1990"
  email = "bearfly1990@163.com"
  # url = "https://bearfly1990.github.io/BF-Hugo/"
  keywords = "blog, bearfly1990"
  defaultCover = "img/post-bg-miui6.jpg"
  rss = true
  lastmod = true
  favicon = "/images/github-mark.png"
  avatar = "/images/avatar.png"
  headerIcon = "/images/github-mark-white.png"
  location = "China"
  userStatusEmoji = "😀"
  enableGitalk = false
  enableSearch = true
  # staticPrefix = ""  # 清空硬编码的资源前缀
  # 其他主题参数（如深色模式、标题等，按需加）
  [params.gitalk]
    clientID = "Your client ID" # Your client ID
    clientSecret = "Your client secret" # Your client secret
    repo = "BF-Hugo" # 您的博客的github地址Repository name，例如：xxxx.github.io
    owner = "bearfly1990" # 您的GitHub ID
    admin = "bearfly1990" # 您的GitHub ID
    id = "https://bearfly1990.github.io/BF-Hugo/" # 文章页面的链接地址就是ID
    labels = "gitalk" # Github issue labels. If you used to use Gitment, you can change it
    perPage = 15 # Pagination size, with maximum 100.
    pagerDirection = "last" # Comment sorting direction, available values are 'last' and 'first'.
    createIssueManually = true # 设置为true，如果是管理员登录，会自动创建issue，如果是false，需要管理员手动添加第一个评论(issue)
    distractionFreeMode = false # Enable hot key (cmd|ctrl + enter) submit comment.
    proxy = "https://cors-anywhere.azm.workers.dev/https://github.com/login/oauth/access_token" # 可以自行添加反向代理
  #[[params.links]]
    #title = "Link"
    #href = "https://github.com/meik2333"
  #[[params.links]]
   # title = "Link2"
   # href = "https://meik2333.com"
   # icon = "https://meik2333.com/images/avatar.png"

# 可选：限定索引内容范围（避免冗余）
[params.search]
  enable = true
  # 排除不需要索引的目录（如草稿、隐私页面）
  exclude = ["/draft/", "/privacy/"]

[frontmatter]
  lastmod = ["lastmod", ":fileModTime", ":default"]

#[services]
# [services.googleAnalytics]
#   ID = "UA-123456-789"

[imaging]
  lazyLoading = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true